<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excel Read-Only Dashboard</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #0b1220;
      --card: #172033;
      --line: rgba(255,255,255,.10);
      --text: #e5eefc;
      --muted: #97a6c1;
      --accent: #7c3aed;
      --accent-2: #22c55e;
      --danger: #ef4444;
      --shadow: 0 18px 45px rgba(0,0,0,.30);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(124,58,237,.30), transparent 35%),
        radial-gradient(circle at bottom right, rgba(34,197,94,.18), transparent 35%),
        linear-gradient(180deg, #0b1020 0%, var(--bg) 100%);
      color: var(--text);
    }

    .app {
      max-width: 1500px;
      margin: 0 auto;
      padding: 20px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.2fr .8fr;
      gap: 16px;
      align-items: stretch;
      margin-bottom: 16px;
    }

    .banner, .summary, .panel {
      background: rgba(17, 24, 39, .82);
      backdrop-filter: blur(14px);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .banner {
      padding: 22px;
      position: relative;
      overflow: hidden;
    }

    .banner h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 3vw, 40px);
      letter-spacing: -.03em;
    }

    .banner p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
      max-width: 70ch;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .pill {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      color: var(--text);
      border: 1px solid var(--line);
      font-size: 13px;
    }

    .summary {
      padding: 18px;
      display: grid;
      gap: 12px;
      align-content: start;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .stat {
      background: rgba(255,255,255,.04);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
    }

    .stat .label { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
    .stat .value { font-size: 20px; font-weight: 700; }

    .main-grid {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 16px;
      align-items: start;
    }

    .panel {
      padding: 16px;
    }

    .panel h2 {
      margin: 0 0 14px;
      font-size: 18px;
      letter-spacing: -.02em;
    }

    .controls {
      display: grid;
      gap: 12px;
    }

    .control-group {
      display: grid;
      gap: 8px;
    }

    .control-group label {
      font-size: 13px;
      color: var(--muted);
    }

    input[type="text"], select, textarea, button {
      width: 100%;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.05);
      color: var(--text);
      padding: 12px 14px;
      font: inherit;
      outline: none;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
      line-height: 1.45;
    }

    input[type="file"] {
      width: 100%;
      color: var(--muted);
    }

    input::placeholder, textarea::placeholder { color: #7f8ba6; }
    select option { background: #0f172a; }

    button {
      cursor: pointer;
      transition: transform .12s ease, opacity .12s ease, background .12s ease;
      font-weight: 600;
    }

    button:hover { transform: translateY(-1px); }
    .btn-primary { background: linear-gradient(135deg, var(--accent), #4f46e5); border-color: transparent; }
    .btn-success { background: linear-gradient(135deg, #16a34a, #22c55e); border-color: transparent; }
    .btn-ghost { background: rgba(255,255,255,.04); }
    .btn-danger { background: rgba(239,68,68,.12); border-color: rgba(239,68,68,.30); }

    .row-actions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .divider {
      height: 1px;
      background: var(--line);
      margin: 6px 0;
    }

    .table-card {
      background: rgba(17,24,39,.82);
      backdrop-filter: blur(14px);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .table-toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.03);
    }

    .table-toolbar .left,
    .table-toolbar .right {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .table-toolbar input, .table-toolbar select {
      min-width: 180px;
      padding: 10px 12px;
      border-radius: 12px;
    }

    .table-wrap {
      overflow: auto;
      max-height: 68vh;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 900px;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #0f172a;
      color: #f8fafc;
      text-align: left;
      font-size: 13px;
      letter-spacing: .02em;
      text-transform: none;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    thead th .sort {
      opacity: .8;
      margin-left: 6px;
      font-size: 12px;
    }

    tbody td {
      padding: 11px 14px;
      border-bottom: 1px solid rgba(255,255,255,.06);
      vertical-align: top;
      color: #dbe7fb;
      font-size: 14px;
    }

    tbody tr:nth-child(2n) { background: rgba(255,255,255,.02); }
    tbody tr:hover { background: rgba(124,58,237,.08); }

    .empty {
      padding: 28px;
      text-align: center;
      color: var(--muted);
    }

    .footer-note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .iframe-box {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
      min-height: 340px;
    }

    .iframe-box iframe {
      width: 100%;
      height: 420px;
      border: 0;
      display: block;
      background: #fff;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(34,197,94,.12);
      border: 1px solid rgba(34,197,94,.25);
      color: #baf7cb;
      font-size: 12px;
    }

    @media (max-width: 1100px) {
      .hero, .main-grid { grid-template-columns: 1fr; }
      .table-toolbar .left, .table-toolbar .right { width: 100%; }
      .table-toolbar input, .table-toolbar select { flex: 1 1 180px; }
    }
  </style>
</head>
<body>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Inter, Arial, sans-serif;
      background: #0b1020;
      color: white;
      min-height: 100vh;
      overflow: hidden;
    }

    .app {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .hero {
      width: 100%;
      padding: 28px 40px;
      background: linear-gradient(135deg, #111827 0%, #1e293b 100%);
      border-bottom: 1px solid rgba(255,255,255,.08);
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
      z-index: 2;
    }

    .hero h1 {
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .excel-container {
      flex: 1;
      width: 100%;
      background: #ffffff;
    }

    .excel-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>

  <div class="app">
    <section class="hero">
      <h1>Scorecard</h1>
    </section>

    <section class="excel-container">
      <iframe
        title="Excel incrustado"
        src="https://1drv.ms/x/c/9c6f093978b6ceb0/IQTT2O82gvurTKxe-rJ0gS1UAUBPlNt60SBkHcVZ4-oPF5c?AllowTyping=True&wdHideGridlines=True&wdHideHeaders=True&wdInConfigurator=True&wdInConfigurator=True&edaebf=rslc0"
        loading="lazy"
      ></iframe>
    </section>
  </div>
</body>
</html>
