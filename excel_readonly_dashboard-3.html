<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excel Read-Only Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #060816;
      --panel: rgba(15, 23, 42, 0.72);
      --line: rgba(255,255,255,0.08);
      --text: #f8fafc;
      --muted: #94a3b8;
      --glow: rgba(99,102,241,.35);
    }

    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(99,102,241,.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(56,189,248,.14), transparent 30%),
        linear-gradient(180deg, #020617 0%, #0b1120 100%);
      color: var(--text);
      min-height: 100vh;
      overflow: hidden;
    }

    .app {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 18px;
      gap: 18px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      width: 100%;
      min-height: 120px;
      padding: 28px 34px;
      border-radius: 28px;
      background: var(--panel);
      backdrop-filter: blur(18px);
      border: 1px solid var(--line);
      box-shadow:
        0 10px 40px rgba(0,0,0,.35),
        inset 0 1px 0 rgba(255,255,255,.05);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .hero::before {
      content: "";
      position: absolute;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: var(--glow);
      filter: blur(90px);
      top: -180px;
      right: -100px;
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
    }

    .hero-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.08);
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 14px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .hero h1 {
      font-size: clamp(38px, 5vw, 64px);
      font-weight: 800;
      letter-spacing: -0.06em;
      line-height: .95;
      text-shadow: 0 4px 30px rgba(0,0,0,.25);
    }

    .hero p {
      margin-top: 10px;
      color: var(--muted);
      font-size: 15px;
      max-width: 700px;
      line-height: 1.6;
    }

    .status-card {
      position: relative;
      z-index: 2;
      min-width: 180px;
      padding: 18px;
      border-radius: 22px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      backdrop-filter: blur(14px);
      text-align: right;
    }

    .status-card .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .status-card .value {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.04em;
    }

    .excel-shell {
      flex: 1;
      border-radius: 30px;
      overflow: hidden;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      box-shadow:
        0 15px 45px rgba(0,0,0,.35),
        inset 0 1px 0 rgba(255,255,255,.05);
      position: relative;
    }

    .excel-shell::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 54px;
      background: linear-gradient(180deg, rgba(255,255,255,.04), transparent);
      pointer-events: none;
      z-index: 2;
    }

    .excel-toolbar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 3;
      backdrop-filter: blur(10px);
    }

    .dots {
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(255,255,255,.22);
    }

    .excel-title {
      color: var(--muted);
      font-size: 13px;
      letter-spacing: .03em;
    }

    .excel-shell iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }

    @media (max-width: 900px) {
      .hero {
        flex-direction: column;
        align-items: flex-start;
        gap: 18px;
      }

      .status-card {
        width: 100%;
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Inter, Arial, sans-serif;
      background: #0b1020;
      color: white;
      min-height: 100vh;
      overflow: hidden;
    }

    .app {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .hero {
      width: 100%;
      padding: 28px 40px;
      background: linear-gradient(135deg, #111827 0%, #1e293b 100%);
      border-bottom: 1px solid rgba(255,255,255,.08);
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
      z-index: 2;
    }

    .hero h1 {
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .excel-container {
      flex: 1;
      width: 100%;
      background: #ffffff;
    }

    .excel-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>

  <div class="app">
    <section class="hero">
      <div class="hero-content">
        <div class="hero-tag">Executive Dashboard</div>
        <h1>Scorecard</h1>
        <p>
          Centralized read-only visualization for operational metrics, reports and live Excel-based tracking.
        </p>
      </div>

      <div class="status-card">
        <div class="label">Status</div>
        <div class="value">Live</div>
      </div>
    </section>

    <section class="excel-shell">
      <div class="excel-toolbar">
        <div class="dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>

        <div class="excel-title">Embedded Microsoft Excel Workspace</div>
      </div>

      <iframe
        title="Excel incrustado"
        src="https://1drv.ms/x/c/9c6f093978b6ceb0/IQTT2O82gvurTKxe-rJ0gS1UAUBPlNt60SBkHcVZ4-oPF5c?AllowTyping=True&wdHideGridlines=True&wdHideHeaders=True&wdInConfigurator=True&wdInConfigurator=True&edaebf=rslc0"
        loading="lazy"
      ></iframe>
    </section>
  </div>
</body>
</html>
